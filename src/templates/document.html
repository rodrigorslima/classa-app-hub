<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{DOC_TITLE}} do aplicativo {{APP_NAME}}.">
  <title>{{APP_NAME}} | {{DOC_TITLE}}</title>
  
  <!-- CSS Compartilhado -->
  <link rel="stylesheet" href="../assets/css/style.css">

  <!-- Estilos Dinâmicos do App (Cores do Tema) -->
  <style>
    :root {
      --primary-color: {{THEME_PRIMARY}};
      --secondary-color: {{THEME_SECONDARY}};
      --bg-color: {{THEME_DARK}};
      --card-bg: rgba(255, 255, 255, 0.02);
      --card-border: rgba(255, 255, 255, 0.05);
      --glow-color: {{THEME_PRIMARY}}1a;
    }
    
    body::after {
      background: radial-gradient(circle, {{THEME_PRIMARY}}22 0%, transparent 70%);
    }
  </style>
</head>
<body class="document-view">
  <div class="glow-orb-secondary"></div>

  <!-- Cabeçalho Simplificado -->

  <header>
    <div class="nav-container">
      <a href="../" class="logo">
        <span class="logo-class">Class</span><span class="logo-a">A</span><span class="logo-brackets">{}</span>
      </a>

      <div class="footer-links">
        <a href="./" class="footer-link">Landing Page</a>
      </div>
    </div>
  </header>

  <!-- Container Principal -->
  <main class="app-detail-container">
    
    <!-- Botão de Voltar -->
    <div class="back-btn-wrapper">
      <a href="./" class="back-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Voltar para a Landing Page
      </a>
    </div>

    <!-- Layout do Documento -->
    <section class="document-section">
      <div class="doc-card">
        <div class="doc-content">
          <h1>{{DOC_TITLE}}</h1>
          <p class="doc-last-updated">Última atualização: 2026</p>
          
          <div class="app-info-mini">
            <img src="{{APP_ICON}}" alt="Ícone de {{APP_NAME}}" class="mini-icon">
            <div>
              <strong>{{APP_NAME}}</strong>
              <span>{{APP_CATEGORY}}</span>
            </div>
          </div>
          
          <hr class="doc-separator">
          
          {{DOC_CONTENT}}
        </div>
      </div>
    </section>

  </main>

  <!-- Rodapé -->
  <footer>
    <div class="footer-content">
      <p>&copy; 2026 ClassA. Todos os direitos reservados para {{APP_NAME}}.</p>
      <div class="footer-links">
        <a href="../" class="footer-link">Meus Apps</a>
        <a href="./" class="footer-link">Landing Page</a>
      </div>
    </div>
  </footer>

</body>
</html>
